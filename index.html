<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Palabras">
<title>Palabras</title>
<style>
  :root{
    --bg1:#f8fafc; --bg2:#eef2ff;
    --ink:#1e293b; --ink2:#64748b; --ink3:#94a3b8;
    --line:#e2e8f0;
    --indigo:#4f46e5; --indigo-d:#4338ca;
    --ok-bg:#ecfdf5; --ok-line:#6ee7b7; --ok-tx:#065f46;
    --no-bg:#fff1f2; --no-line:#fda4af; --no-tx:#9f1239;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(to bottom,var(--bg1),var(--bg2));
    background-attachment:fixed;
    min-height:100vh; min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    padding:calc(16px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:500px;margin:0 auto}

  /* hlavička */
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .brand{display:flex;align-items:center;gap:8px}
  .dot{width:10px;height:10px;border-radius:99px;background:var(--indigo)}
  .mark{font-family:Georgia,serif;font-weight:700;font-size:20px}
  .seg{display:flex;background:#e2e8f0b3;border-radius:9px;padding:2px;font-size:12px;font-weight:600}
  .segbtn{border:0;background:transparent;color:var(--ink2);padding:6px 10px;border-radius:7px;cursor:pointer;font:inherit}
  .segbtn.on{background:#fff;color:var(--indigo-d);box-shadow:0 1px 2px #0000001a}

  /* filter úrovní */
  .filters{display:flex;gap:6px;margin-bottom:14px}
  .chip{flex:1;border:1px solid var(--line);background:#fff;color:var(--ink2);
        border-radius:10px;padding:8px 2px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
  .chip.on{background:var(--indigo);border-color:var(--indigo);color:#fff}
  .chip small{display:block;font-size:10px;font-weight:400;opacity:.65;margin-top:1px}

  /* štatistiky */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 4px;text-align:center}
  .stat b{display:block;font-size:17px;line-height:1}
  .stat span{display:block;font-size:11px;color:var(--ink3);margin-top:4px}
  .stat i{display:block;font-style:normal;font-size:10px;color:#cbd5e1}

  /* Leitnerove škatuľky */
  .boxes{display:flex;gap:5px}
  .box{flex:1;border-radius:8px;padding:7px 0;text-align:center;font-size:13px;font-weight:700}
  .lvl1{background:#e0e7ff;color:#312e81}
  .lvl2{background:#c7d2fe;color:#312e81}
  .lvl3{background:#a5b4fc;color:#1e1b4b}
  .lvl4{background:#818cf8;color:#fff}
  .lvl5{background:var(--indigo);color:#fff}
  .boxcap{display:flex;justify-content:space-between;margin:5px 2px 18px;font-size:11px;color:var(--ink3)}

  /* karta so zadaním */
  .card{background:#fff;border:1px solid var(--line);border-radius:22px;
        box-shadow:0 12px 30px -12px #4f46e526;padding:26px 20px;text-align:center;margin-bottom:16px}
  .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
  .prompt{font-family:Georgia,serif;font-weight:700;line-height:1.2;word-break:break-word;hyphens:auto}
  .p-xl{font-size:34px}
  .p-lg{font-size:27px}
  .p-md{font-size:22px}
  .p-sm{font-size:18px;line-height:1.35}

  /* možnosti */
  .opts{display:grid;gap:10px}
  .opt{width:100%;padding:15px 14px;border:2px solid var(--line);border-radius:16px;background:#fff;
       color:var(--ink);font-family:inherit;font-weight:500;cursor:pointer;
       transition:border-color .15s,background .15s}
  .opt.short{text-align:center;font-size:18px}
  .opt.long{text-align:left;font-size:15px;line-height:1.4}
  .opt:hover{border-color:#a5b4fc}
  .opt:active{background:#f8fafc}
  .opt:disabled{cursor:default}
  .opt.ok{background:var(--ok-bg);border-color:var(--ok-line);color:var(--ok-tx)}
  .opt.no{background:var(--no-bg);border-color:var(--no-line);color:var(--no-tx)}
  .opt.dim{color:var(--ink3)}
  @media (prefers-reduced-motion:reduce){.opt{transition:none}}

  .nudge{text-align:center;font-size:14px;color:var(--ink2);margin:14px 0 0}
  .btn{width:100%;border:0;border-radius:14px;padding:14px;font-size:16px;font-weight:600;
       cursor:pointer;margin-top:14px;font-family:inherit}
  .btn.dark{background:#1e293b;color:#fff}
  .btn.dark:hover{background:#0f172a}
  .btn.primary{background:var(--indigo);color:#fff}
  .btn.primary:hover{background:var(--indigo-d)}
  .btn.ghost{background:#fff;border:1px solid #cbd5e1;color:var(--ink)}

  .foot{display:flex;align-items:center;justify-content:space-between;margin-top:20px;font-size:14px}
  .link{border:0;background:none;cursor:pointer;font-size:14px;font-weight:500;color:var(--indigo);padding:0;font-family:inherit}
  .link.muted{color:var(--ink3);font-weight:400}

  /* panel tipov */
  .tips{margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:18px;
        padding:20px;font-size:14px;line-height:1.55;color:var(--ink2)}
  .tip{margin-bottom:15px}
  .tip:last-child{margin-bottom:0}
  .tip h4{margin:0 0 3px;font-size:14px;color:var(--ink)}

  /* obrazovky */
  .screen{background:#fff;border:1px solid var(--line);border-radius:22px;
          box-shadow:0 12px 30px -12px #4f46e526;padding:32px 24px;text-align:center;margin-top:24px}
  .big{font-family:Georgia,serif;font-weight:700;font-size:25px;margin:0 0 6px}
  .emoji{font-size:46px;margin-bottom:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0}
  .cell{background:#f8fafc;border-radius:12px;padding:15px 4px}
  .cell b{display:block;font-family:Georgia,serif;font-size:23px}
  .cell span{display:block;font-size:12px;color:var(--ink3);margin-top:4px}
  .row{display:flex;gap:10px}
</style>
</head>

<script>
// ── prevod kompaktného slovníka na pracovný tvar ──
const LEVELS = ["slovo","fráza","veta"];
const WORDS = WORDS_RAW.map(w => ({cz:w[0], es:w[1], lvl:w[2]}));

const MAX_BOX = 5;
const SAVE_KEY = "palabras-v1";

// ── ukladanie postupu do pamäte telefónu ──
function load(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY)) || null; }catch(e){ return null; } }
function persist(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(
    {boxes:S.boxes, best:S.best, direction:S.direction, filter:S.filter})); }catch(e){}
}

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// aktívny výber podľa filtra (-1 = všetko)
function pool(){ return S.filter<0 ? WORDS : WORDS.filter(w=>w.lvl===S.filter); }

// výber slova: nižšia škatuľka = vyššia šanca, že príde na rad
function pickWord(exclude){
  const p = pool().filter(w=>w.es!==exclude);
  const src = p.length ? p : pool();
  const weights = src.map(w=>MAX_BOX+1-(S.boxes[w.es]||1));
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<src.length;i++){ r-=weights[i]; if(r<=0) return src[i]; }
  return src[src.length-1];
}

// falošné možnosti sa ťahajú z rovnakej úrovne, aby dĺžka odpovede neprezradila správnu
function makeQuestion(word,dir){
  const same = WORDS.filter(w=>w.lvl===word.lvl);
  if(dir==="cz-es"){
    const d = shuffle(same.filter(w=>w.es!==word.es)).slice(0,3).map(w=>w.es);
    return {prompt:word.cz, label:"Prelož do španielčiny", correct:word.es, options:shuffle([word.es,...d])};
  }
  const d = shuffle(same.filter(w=>w.cz!==word.cz)).slice(0,3).map(w=>w.cz);
  return {prompt:word.es, label:"Prelož do češtiny", correct:word.cz, options:shuffle([word.cz,...d])};
}

function newQuestion(exclude){
  const word = pickWord(exclude);
  return {word, question:makeQuestion(word,S.direction)};
}
function masteredCount(){ return pool().filter(w=>(S.boxes[w.es]||1)===MAX_BOX).length; }

// ── stav ──
const saved = load();
const S = {
  boxes: (saved&&saved.boxes) ? saved.boxes : {},
  best: (saved&&saved.best) || 0,
  direction: (saved&&saved.direction) || "cz-es",
  filter: (saved && typeof saved.filter==="number") ? saved.filter : -1,
  answered:0, correct:0, streak:0,
  selected:null, screen:"play", showTips:false, timer:null,
  word:null, question:null,
};
(function seed(){ const q=newQuestion(null); S.word=q.word; S.question=q.question; })();

// ── akcie ──
function choose(i){
  if(S.selected!==null) return;
  const opt = S.question.options[i];
  S.selected = opt;
  S.answered++;
  const right = opt===S.question.correct;
  if(right){ S.correct++; S.streak++; if(S.streak>S.best) S.best=S.streak; }
  else S.streak=0;
  const es=S.word.es, cur=S.boxes[es]||1;
  S.boxes[es] = right ? Math.min(cur+1,MAX_BOX) : 1;
  persist(); render();
  if(right){ clearTimeout(S.timer); S.timer=setTimeout(next,700); }  // správne → automaticky ďalej
}
function next(){
  clearTimeout(S.timer);
  if(masteredCount()===pool().length){ S.screen="won"; render(); return; }
  S.selected=null;
  const q=newQuestion(S.word.es);
  S.word=q.word; S.question=q.question;
  render();
}
function reQuestion(){
  S.selected=null; clearTimeout(S.timer);
  const q=newQuestion(null); S.word=q.word; S.question=q.question;
  persist(); render();
}
function switchDir(dir){ if(dir===S.direction) return; S.direction=dir; reQuestion(); }
function setFilter(f){ if(f===S.filter) return; S.filter=f; reQuestion(); }
function endSession(){ clearTimeout(S.timer); S.screen="end"; render(); }
function resume(){ S.screen="play"; render(); }
function reset(){
  clearTimeout(S.timer);
  S.boxes={}; S.best=0; S.answered=0; S.correct=0; S.streak=0;
  S.selected=null; S.screen="play";
  const q=newQuestion(null); S.word=q.word; S.question=q.question;
  persist(); render();
}
function toggleTips(){ S.showTips=!S.showTips; render(); }

// ── klávesnica (na počítači): 1–4 výber, Enter/šípka = ďalej ──
document.addEventListener("keydown",e=>{
  if(S.screen!=="play") return;
  if(S.selected===null){
    const n=parseInt(e.key,10);
    if(n>=1&&n<=S.question.options.length) choose(n-1);
  }else if(e.key==="Enter"||e.key===" "||e.key==="ArrowRight"){ e.preventDefault(); next(); }
});

// ── pomocné: veľkosť písma podľa dĺžky textu ──
function promptClass(t){
  const n=t.length;
  if(n<=12) return "p-xl";
  if(n<=24) return "p-lg";
  if(n<=44) return "p-md";
  return "p-sm";
}
function optClass(opts){
  const longest = opts.reduce((m,o)=>Math.max(m,o.length),0);
  return longest<=24 ? "short" : "long";
}
function esc(t){ return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── vykreslenie ──
function render(){
  const app=document.getElementById("app");
  if(S.screen==="won"){ app.innerHTML = wonScreen(); return; }
  if(S.screen==="end"){ app.innerHTML = endScreen(); return; }

  const acc = S.answered ? Math.round(S.correct/S.answered*100) : 0;
  const wrong = S.selected!==null && S.selected!==S.question.correct;
  const P = pool();

  const counts = [-1,0,1,2].map(f => f<0 ? WORDS.length : WORDS.filter(w=>w.lvl===f).length);
  const names  = ["Všetko","Slová","Frázy","Vety"];
  const chips = [-1,0,1,2].map((f,i)=>
    `<button class="chip ${S.filter===f?"on":""}" onclick="setFilter(${f})">${names[i]}<small>${counts[i]}</small></button>`
  ).join("");

  const boxesHtml = [1,2,3,4,5].map(lvl=>{
    const c = P.filter(w=>(S.boxes[w.es]||1)===lvl).length;
    return `<div class="box lvl${lvl}">${c}</div>`;
  }).join("");

  const oc = optClass(S.question.options);
  const optsHtml = S.question.options.map((o,i)=>{
    let cls="";
    if(S.selected!==null){
      if(o===S.question.correct) cls="ok";
      else if(o===S.selected) cls="no";
      else cls="dim";
    }
    return `<button class="opt ${oc} ${cls}" ${S.selected!==null?"disabled":""} onclick="choose(${i})">${esc(o)}</button>`;
  }).join("");

  app.innerHTML = `
  <div class="wrap">
    <div class="head">
      <div class="brand"><span class="dot"></span><span class="mark">Palabras</span></div>
      <div class="seg">
        <button class="segbtn ${S.direction==="cz-es"?"on":""}" onclick="switchDir('cz-es')">CZ → ES</button>
        <button class="segbtn ${S.direction==="es-cz"?"on":""}" onclick="switchDir('es-cz')">ES → CZ</button>
      </div>
    </div>

    <div class="filters">${chips}</div>

    <div class="stats">
      <div class="stat"><b>${S.answered}</b><span>Otázky</span></div>
      <div class="stat"><b>${acc}%</b><span>Úspešnosť</span></div>
      <div class="stat"><b>${S.streak}</b><span>Séria</span><i>${S.best?"rekord "+S.best:""}</i></div>
    </div>

    <div class="boxes">${boxesHtml}</div>
    <div class="boxcap"><span>Nové</span><span>Zvládnuté ${masteredCount()} / ${P.length}</span></div>

    <div class="card">
      <div class="lbl">${S.question.label} · ${LEVELS[S.word.lvl]}</div>
      <div class="prompt ${promptClass(S.question.prompt)}">${esc(S.question.prompt)}</div>
    </div>

    <div class="opts">${optsHtml}</div>

    ${wrong ? `<p class="nudge">Skús si k tomu vymyslieť krátky živý obraz — lepšie sa to uchytí.</p>
      <button class="btn dark" onclick="next()">Ďalšie</button>` : ""}

    <div class="foot">
      <button class="link" onclick="toggleTips()">${S.showTips?"Skryť tipy ▴":"Ako sa učiť rýchlo ▾"}</button>
      <button class="link muted" onclick="endSession()">Ukončiť reláciu</button>
    </div>

    ${S.showTips ? tipsHtml() : ""}
  </div>`;
}

function tipsHtml(){
  return `<div class="tips">
    <div class="tip"><h4>Aktívne vybavovanie</h4>Skús si preklad vybaviť skôr, než pozrieš na možnosti — aj keď hádaš, to úsilie ukladá slovo hlbšie než opakované čítanie.</div>
    <div class="tip"><h4>Rozložené opakovanie</h4>Slovo si zapamätáš nadlho, keď sa k nemu vraciaš v čase, nie keď ho dvadsaťkrát prečítaš naraz. Appka to robí za teba cez škatuľky hore.</div>
    <div class="tip"><h4>Najprv frázy, potom vety</h4>Frázy ako „tengo que" či „¿dónde está?" sú stavebné kamene — keď ich vieš spamäti, vety si poskladáš sám. Preto sa oplatí drilovať ich zvlášť.</div>
    <div class="tip"><h4>Vlastný obraz</h4>Ku každému slovu si vytvor krátky živý obraz cez podobne znejúce slovo. „Caballo" (kôň) znie ako kavaléria na koňoch. Čím absurdnejší obraz, tým lepšie drží.</div>
    <div class="tip"><h4>Nahlas a v kontexte</h4>Vyslov to nahlas a hneď vlož do krátkej vety. Pamäť viaže zvuk a použitie silnejšie než holé slovo.</div>
    <div class="tip"><h4>Málo a často</h4>Desať minút denne poráža dve hodiny raz za týždeň. Krátke pravidelné dávky sú základ.</div>
  </div>`;
}

function endScreen(){
  const acc = S.answered ? Math.round(S.correct/S.answered*100) : 0;
  return `<div class="wrap"><div class="screen">
    <div class="big">Zhrnutie relácie</div>
    <div class="grid2">
      <div class="cell"><b>${S.answered}</b><span>Zodpovedané</span></div>
      <div class="cell"><b>${acc}%</b><span>Úspešnosť</span></div>
      <div class="cell"><b>${S.best}</b><span>Najdlhšia séria</span></div>
      <div class="cell"><b>${masteredCount()}/${pool().length}</b><span>Zvládnuté</span></div>
    </div>
    <div class="row">
      <button class="btn primary" onclick="resume()">Pokračovať</button>
      <button class="btn ghost" onclick="reset()">Vynulovať postup</button>
    </div>
  </div></div>`;
}

function wonScreen(){
  return `<div class="wrap"><div class="screen">
    <div class="emoji">🎉</div>
    <div class="big">¡Lo lograste!</div>
    <p style="color:var(--ink2);margin:0 0 20px">Všetkých ${pool().length} položiek v tomto výbere si dostal do poslednej škatuľky.</p>
    <button class="btn primary" onclick="resume()">Pokračovať ďalej</button>
  </div></div>`;
}

(function pwa(){
  const icon = 'data:image/svg+xml,'+encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="112" fill="#4f46e5"/><text x="50%" y="53%" font-family="Georgia,serif" font-size="300" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="central">P</text></svg>');
  const apple=document.createElement('link'); apple.rel='apple-touch-icon'; apple.href=icon; document.head.appendChild(apple);
  const manifest={name:"Palabras",short_name:"Palabras",display:"standalone",background_color:"#f8fafc",theme_color:"#4f46e5",start_url:".",icons:[{src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"any"}]};
  const link=document.createElement('link'); link.rel='manifest';
  try{ link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'})); document.head.appendChild(link); }catch(e){}
})();

render();
</script>
